<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MidnightMens Vue</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f6f7fb; }
    .nav { display:flex; gap:12px; padding:12px 16px; background:#111; color:#fff; }
    .nav a { color:#fff; text-decoration:none; }
    .container { max-width: 900px; margin: 24px auto; background:#fff; padding:20px; border-radius: 12px; }
    input, textarea { width:100%; margin:6px 0 12px; padding:10px; }
    button { padding:10px 12px; }
    .post { border-bottom:1px solid #ddd; padding:12px 0; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <script src="/app.js"></script>
</body>
</html>
