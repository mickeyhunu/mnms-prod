<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미드나잇 맨즈</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/community-board.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <h1>미드나잇 맨즈</h1>
            </a>
            <nav class="nav" id="navigation">
                <div class="nav-guest" id="nav-guest">
                    <a href="login.html" class="btn btn-outline btn-sm">로그인</a>
                    <a href="register.html" class="btn btn-primary btn-sm">회원가입</a>
                </div>
                <div class="nav-user hidden" id="nav-user">
                    <span class="user-nickname" id="user-nickname"></span>
                    <a href="my-page.html" class="btn btn-outline btn-sm">마이페이지</a>
                    <a href="bookmarks.html" class="btn btn-outline btn-sm">북마크</a>
                    <a href="create-post.html" class="btn btn-primary btn-sm">글쓰기</a>
                    <a href="admin.html" class="btn btn-secondary btn-sm hidden" id="admin-link">관리자</a>
                    <button class="btn btn-outline btn-sm" id="logout-btn">로그아웃</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container home-service-wrap">
            <div class="service-category-tabs" role="tablist" aria-label="홈 카테고리">
                <button type="button" class="service-tab active" data-category="live" role="tab" aria-selected="true">LIVE</button>
                <button type="button" class="service-tab" data-category="community" role="tab" aria-selected="false">커뮤니티</button>
                <button type="button" class="service-tab" data-category="business" role="tab" aria-selected="false">업체정보</button>
            </div>

            <section class="service-grid active" data-panel="live" role="tabpanel">
                <a class="service-item" href="post-detail.html?id=1">
                    <span class="service-icon">🔴</span>
                    <span class="service-label">실시간 이슈</span>
                </a>
                <a class="service-item" href="post-detail.html?id=2">
                    <span class="service-icon">🎥</span>
                    <span class="service-label">LIVE 영상</span>
                </a>
                <a class="service-item" href="my-page.html">
                    <span class="service-icon">💬</span>
                    <span class="service-label">실시간 상담</span>
                </a>
            </section>

            <section class="service-grid" data-panel="community" role="tabpanel" hidden>
                <a class="service-item" href="index.html">
                    <span class="service-icon">📝</span>
                    <span class="service-label">자유게시판</span>
                </a>
                <a class="service-item" href="create-post.html">
                    <span class="service-icon">✍️</span>
                    <span class="service-label">커뮤니티 글쓰기</span>
                </a>
                <a class="service-item" href="bookmarks.html">
                    <span class="service-icon">⭐</span>
                    <span class="service-label">인기글</span>
                </a>
            </section>

            <section class="service-grid" data-panel="business" role="tabpanel" hidden>
                <a class="service-item" href="my-page.html">
                    <span class="service-icon">🏢</span>
                    <span class="service-label">업체정보</span>
                </a>
                <a class="service-item" href="register.html">
                    <span class="service-icon">📌</span>
                    <span class="service-label">업체등록</span>
                </a>
                <a class="service-item" href="admin.html">
                    <span class="service-icon">📞</span>
                    <span class="service-label">문의하기</span>
                </a>
            </section>
        </div>
    </main>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/auth.js"></script>
    <script src="js/api/apiClient.js"></script>
    <script src="js/api/authAPI.js"></script>
    <script src="js/pages/home.js"></script>
</body>
</html>
