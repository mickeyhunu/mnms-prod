# MySQL (root)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/community?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secret=mySecretKey12345678901234567890123456789012345678901234567890
jwt.expiration=86400000

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/static/**

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.community.dto

logging.level.com.community=DEBUG
logging.level.root=INFO

server.port=8080

logging.level.com.community.mapper=DEBUG
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=2KB

spring.web.resources.cache.period=0
spring.web.resources.cache.use-last-modified=false
